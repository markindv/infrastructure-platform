name: Compose CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-compose:
    name: Validate Docker Compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          test -f compose/docker-compose.yml
          test -f compose/.env.example
          test -f compose/README.md

      - name: Validate Docker Compose config
        run: |
          cd compose
          cp .env.example .env
          docker compose config

      - name: Start services
        run: |
          cd compose
          docker compose up -d

      - name: Smoke test Nginx
        run: |
          for i in {1..10}; do
            if curl -s http://localhost:8080 | grep "Hello from Compose"; then
              echo "Nginx is ready"
              exit 0
            fi

            echo "Waiting for Nginx..."
            sleep 3
          done

          echo "Nginx did not become ready"
          cd compose
          docker compose logs
          exit 1

      - name: Show container logs
        if: failure()
        run: |
          cd compose
          docker compose logs

      - name: Stop services
        if: always()
        run: |
          cd compose
          docker compose down
